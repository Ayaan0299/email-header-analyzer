<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Header Analyzer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="site-wrapper">
<div class="container">

  <header class="site-header">
    <div class="header-top">
      <div class="brand">
        <span class="brand-tag">// CYBERSECURITY TOOL</span>
        <span class="brand-name">Email Header Analyzer</span>
      </div>
      <nav class="site-nav">
        <a href="/" class="nav-link nav-link--active">ANALYZE</a>
        <a href="/dashboard" class="nav-link">DASHBOARD</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-icon-wrap">
      <div class="hero-ring r1"></div>
      <div class="hero-ring r2"></div>
      <div class="hero-ring r3"></div>
      <svg class="hero-shield" viewBox="0 0 80 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#22C55E"/>
            <stop offset="100%" stop-color="#3B82F6"/>
          </linearGradient>
          <radialGradient id="sf" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#22C55E" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- Shield body -->
        <path d="M40 4 L76 16 L76 44 Q76 74 40 84 Q4 74 4 44 L4 16 Z" stroke="url(#sg)" stroke-width="1.5" fill="url(#sf)"/>
        <!-- Radar rings -->
        <circle cx="40" cy="46" r="22" stroke="#3B82F6" stroke-width=".6" stroke-dasharray="3 3" opacity=".5"/>
        <circle cx="40" cy="46" r="14" stroke="#22C55E" stroke-width=".6" opacity=".4"/>
        <circle cx="40" cy="46" r="7"  stroke="#22C55E" stroke-width=".6" opacity=".3"/>
        <!-- Rotating arm -->
        <g class="radar-arm">
          <line x1="40" y1="46" x2="40" y2="24" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" opacity=".9"/>
          <path d="M40 46 L40 24 A22 22 0 0 1 54 32 Z" fill="rgba(34,197,94,0.1)"/>
        </g>
        <!-- Blips -->
        <circle cx="40" cy="24" r="2"   fill="#22C55E" opacity=".8"/>
        <circle cx="28" cy="38" r="1.5" fill="#3B82F6" opacity=".6"/>
        <circle cx="54" cy="52" r="1.5" fill="#EF4444" opacity=".5"/>
        <!-- Center -->
        <circle cx="40" cy="46" r="2.5" fill="#22C55E"/>
      </svg>
    </div>
    <h1 class="hero-title">Phishing Detection &amp; Header Analysis</h1>
    <p class="hero-sub">Paste a raw email header for live SPF, DKIM &amp; DMARC validation with an AI-assisted phishing risk verdict.</p>
  </div>

  {% if error %}
  <div class="error-banner">{{ error }}</div>
  {% endif %}

  <form action="/analyse" method="POST">
    <div class="input-card">
      <label for="raw_header" class="input-label">// PASTE RAW EMAIL HEADER</label>
      <textarea
        id="raw_header"
        name="raw_header"
        class="header-input"
        rows="16"
        placeholder="Received: from mail.example.com ([203.0.113.5])
From: PayPal Support &lt;support@paypa1.com&gt;
Reply-To: attacker@evil.xyz
Subject: Urgent: Verify your account
Date: Tue, 22 Apr 2025 10:00:00 +0000
DKIM-Signature: v=1; a=rsa-sha256; d=paypa1.com; s=mail..."></textarea>
    </div>
    <button type="submit" class="btn-analyse">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      RUN ANALYSIS
    </button>
  </form>

</div>
</div>

<script>
(function(){
  var canvas=document.getElementById('starfield');
  var ctx=canvas.getContext('2d');
  var stars=[];
  function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    stars=[];
    for(var i=0;i<200;i++){
      stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.3+0.15,
        vx:(Math.random()-.5)*.04,
        vy:Math.random()*.022+.004,
        a:Math.random()*.65+.2,
        t:Math.random()*Math.PI*2
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      s.t+=.006;
      var alpha=s.a*(.6+.4*Math.sin(s.t));
      ctx.globalAlpha=alpha;
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
      s.x+=s.vx; s.y+=s.vy;
      if(s.y>canvas.height){s.y=-2;s.x=Math.random()*canvas.width;}
      if(s.x<0)s.x=canvas.width;
      if(s.x>canvas.width)s.x=0;
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize(); draw();
})();
</script>
</body>
</html>
